services:
  resume-generator:
    image: ghcr.io/open-resume/resume-generator:latest
    build: .
    volumes:
      # Mount your resume data file
      - ./resume.yaml:/app/resume.yaml
      # Mount an output directory (created automatically)
      - ./output:/app/output
      # Optionally mount custom themes
      # - ./custom-themes:/app/custom/themes
    command: -d /app/resume.yaml -o /app/output

services:
  resume-generator:
    image: ghcr.io/thomasehardt/open-resume:latest
    build: .
    volumes:
      # Mount your resume data file (read-only)
      - ./resume.yaml:/app/resume.yaml:ro
      # Mount an output directory (created automatically)
      - ./output:/app/output
      # Optionally mount custom themes
      # - ./custom-themes:/app/custom/themes
    command: -o /app/output

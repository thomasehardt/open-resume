name: Update Latest Resume Release

on:
  push:
    branches:
      - main
    paths:
      - 'src/content/**'
      - 'src/templates/**'
      - '.github/workflows/latest.yml'

jobs:
  update-latest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Generator Image
        run: docker build -t resume-generator .

      - name: Generate All Resumes
        run: |
          mkdir -p output
          DATA_FILE=$(ls src/content/*.yaml 2>/dev/null | head -1 || ls src/content/examples/*.yaml 2>/dev/null | head -1)
          echo "Using data file: $DATA_FILE"
          docker run --rm \
            -v "$(pwd)/src:/app/src" \
            -v "$(pwd)/output:/app/output" \
            resume-generator \
            -d "/app/src/content/$(basename "$DATA_FILE")"
          sudo chown -R $USER:$USER output

      - name: Prepare Assets for Release
        run: |
          mkdir -p release_assets
          find output -type f \( -name "*.html" -o -name "*.pdf" -o -name "*.docx" -o -name "*.md" -o -name "*.txt" \) -exec cp {} release_assets/ \;

      - name: Update Latest Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Resume"
          files: release_assets/*
          body: |
            This release contains the most up-to-date version of the resume, automatically generated from the `main` branch.

            **Last Updated:** ${{ github.event.head_commit.timestamp }}
            **Commit:** [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

            Generated files (available in HTML, PDF, DOCX, MD, and TXT):
            - **ats/**: ATS-optimized version
            - **modern/**: Modern handout version
          draft: false
          prerelease: false
          make_latest: false

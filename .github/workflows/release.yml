name: Generate and Release Resume

on:
  push:
    tags:
      - '*' # Triggers on any tag push

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Generator Image
        run: docker build -t resume-generator .

      - name: Generate All Resumes
        run: |
          mkdir -p output
          DATA_FILE=$(ls src/content/*.yaml 2>/dev/null | head -1 || ls src/content/examples/*.yaml 2>/dev/null | head -1)
          echo "Using data file: $DATA_FILE"
          docker run --rm \
            -v "$(pwd)/src:/app/src" \
            -v "$(pwd)/output:/app/output" \
            resume-generator \
            -d "/app/src/content/$(basename "$DATA_FILE")"
          sudo chown -R $USER:$USER output

      - name: Prepare Assets for Release
        run: |
          mkdir -p release_assets
          find output -type f \( -name "*.html" -o -name "*.pdf" -o -name "*.docx" -o -name "*.md" -o -name "*.txt" \) -exec cp {} release_assets/ \;

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: release_assets/*
          name: Resume Release ${{ github.ref_name }}
          body: |
            Automated resume generation for version ${{ github.ref_name }}.

            Generated files (available in HTML, PDF, DOCX, MD, and TXT):
            - **ats/**: ATS-optimized version
            - **modern/**: Modern handout version
          draft: false
          prerelease: false
